---
name: CI

"on":
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Bun + Hermes (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      WIRE_CONTRACT_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: 检出代码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: 安装 Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.14
      - name: 使用 base checker 验证 wire contract 历史
        shell: bash
        run: |
          set -euo pipefail
          if git cat-file -e "${WIRE_CONTRACT_BASE_REF}:scripts/check-wire-contract-append-only.ts"; then
            checker_dir="${RUNNER_TEMP}/livis-wire-contract-base"
            git worktree add --detach "${checker_dir}" "${WIRE_CONTRACT_BASE_REF}"
            bun "${checker_dir}/scripts/check-wire-contract-append-only.ts" \
              --root "${GITHUB_WORKSPACE}" \
              --base-ref "${WIRE_CONTRACT_BASE_REF}"
          else
            bun scripts/check-wire-contract-append-only.ts \
              --root "${GITHUB_WORKSPACE}" \
              --base-ref "${WIRE_CONTRACT_BASE_REF}" \
              --allow-bootstrap
          fi
      - name: 安装 Python
        # actions/setup-python v5
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - name: 安装 uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.19"
          enable-cache: true
      - name: 安装锁定依赖
        run: bun install --frozen-lockfile
      - name: 运行统一门禁
        run: bun run check

  hermes-python:
    name: Hermes Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: hermes-plugin
    steps:
      - name: 检出代码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: 安装 Python
        # actions/setup-python v5
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}
      - name: 安装 uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.19"
          enable-cache: true
      - name: 验证锁文件并测试
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          uv lock --check
          uv sync --frozen --python "$PYTHON_VERSION"
          export PYTHONDONTWRITEBYTECODE=1
          uv run --frozen \
            --python "$PYTHON_VERSION" \
            pytest -p no:cacheprovider -q
