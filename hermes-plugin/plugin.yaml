---
name: livis-bridge
label: LiViS Relay Bridge
kind: platform
version: 0.1.0
description: >
  Thin Hermes platform adapter for the local livis-relayd Unix socket.
  The Bun daemon exclusively owns LiViS OAuth, remote WebSocket, SQLite,
  idempotency and result delivery.
author: Jassy930
requires_env:
  - name: LIVIS_RELAY_SOCKET
    description: "Absolute Unix socket path exposed by livis-relayd"
    prompt: "LiViS relay Unix socket"
    password: false
  - name: LIVIS_RELAY_TOKEN
    description: "Bearer token generated by livis-relayd init"
    prompt: "LiViS relay connector token"
    password: true
  - name: LIVIS_ALLOWED_USERS
    description: >-
      Comma-separated LiViS node IDs allowed by both daemon and Hermes
    prompt: "Allowed LiViS node IDs"
    password: false
  - name: LIVIS_PHASE1_READ_ONLY_ACK
    description: >-
      Must be true after configuring a final-only, read-only Hermes profile
    prompt: "Confirm phase-1 read-only profile (true)"
    password: false
optional_env:
  - name: LIVIS_RELAY_CONNECT_TIMEOUT
    description: "Local daemon connection timeout in seconds (default: 10)"
    prompt: "Connection timeout"
    password: false
